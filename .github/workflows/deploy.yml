name: Deploy to WordPress.org

# Builds the plugin and deploys it to the WordPress.org SVN repository
# (trunk + a version tag + the directory assets) whenever a GitHub Release is
# published. Requires the repository secrets SVN_USERNAME and SVN_PASSWORD
# (your WordPress.org account), and an approved plugin so the SVN repo exists.

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: steil-3d-configurator
          ASSETS_DIR: .wordpress-org

      - name: Attach the built zip to the GitHub release
        run: npm run plugin-zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: steil-3d-configurator.zip
